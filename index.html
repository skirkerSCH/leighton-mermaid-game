<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mermaid Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Dark slate background outside game */
            touch-action: none; /* Prevent zooming/scrolling on mobile */
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            /* Removed the background gradient from here */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 100%); /* Ocean gradient moved to the canvas */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            user-select: none;
            backdrop-filter: blur(4px);
            transition: background 0.1s;
        }
        .control-btn:active, .control-btn.active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
        /* Color Picker Styles */
        input[type="color"] {
            appearance: none;
            -moz-appearance: none;
            -webkit-appearance: none;
            background: none;
            border: 0;
            cursor: pointer;
            height: 40px;
            width: 40px;
            padding: 0;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        ::-webkit-color-swatch-wrapper { padding: 0; }
        ::-webkit-color-swatch { border: 0; border-radius: 50%; }
    </style>
</head>
<body class="flex items-center justify-center text-white">

    <div id="game-container">
        <!-- CUSTOMIZATION MENU -->
        <div id="menu-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 z-20 backdrop-blur-sm">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-300 to-blue-500 mb-8 drop-shadow-lg text-center">
                Mermaid Adventure
            </h1>
            
            <div class="bg-white/10 p-6 rounded-2xl w-80 max-w-full backdrop-blur-md border border-white/20 shadow-xl">
                <h2 class="text-xl font-bold mb-4 text-center">Customize Your Mermaid</h2>
                
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="font-semibold text-teal-200">Tail Color:</label>
                        <input type="color" id="tail-color" value="#10b981">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="font-semibold text-yellow-200">Hair Color:</label>
                        <input type="color" id="hair-color" value="#f59e0b">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="font-semibold text-pink-200">Top Color:</label>
                        <input type="color" id="top-color" value="#ec4899">
                    </div>
                </div>

                <div class="mt-8 flex justify-center">
                    <div id="preview-canvas-container" class="w-32 h-32 bg-blue-900/50 rounded-full border-4 border-white/30 flex items-center justify-center relative">
                        <canvas id="previewCanvas" width="80" height="80"></canvas>
                    </div>
                </div>

                <button id="start-btn" class="mt-8 w-full bg-gradient-to-r from-teal-400 to-blue-500 hover:from-teal-300 hover:to-blue-400 text-white font-bold py-3 px-4 rounded-xl shadow-lg transform transition active:scale-95 text-lg">
                    Dive In!
                </button>
            </div>
        </div>

        <!-- UI OVERLAY -->
        <div id="ui-layer" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none hidden">
            <div class="flex gap-2">
                <div class="text-xl md:text-2xl font-bold text-white drop-shadow-md bg-black/30 px-3 md:px-4 py-1 rounded-full border border-white/20">
                    Lv.<span id="level-display">1</span>
                </div>
                <div class="text-xl md:text-2xl font-bold text-white drop-shadow-md bg-black/30 px-3 md:px-4 py-1 rounded-full border border-white/20">
                    ⚪ <span id="score-display">0</span>
                </div>
            </div>
            <div id="lives-display" class="text-xl md:text-2xl drop-shadow-md">
                ❤️❤️❤️
            </div>
        </div>

        <!-- GAME CANVAS -->
        <canvas id="gameCanvas" class="hidden"></canvas>

        <!-- TOUCH CONTROLS -->
        <div id="controls-layer" class="absolute bottom-6 left-0 w-full px-6 flex justify-between z-10 hidden">
            <div class="flex space-x-4">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div>
                <div class="control-btn w-20 h-20 text-3xl" id="btn-jump">▲</div>
            </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 z-30 hidden backdrop-blur-sm">
            <h2 id="game-over-title" class="text-5xl font-bold text-red-400 mb-4 drop-shadow-lg">Game Over!</h2>
            <p class="text-xl mb-8">Pearls Collected: <span id="final-score" class="font-bold text-yellow-300">0</span></p>
            <button id="restart-btn" class="bg-gradient-to-r from-teal-400 to-blue-500 hover:from-teal-300 hover:to-blue-400 text-white font-bold py-3 px-8 rounded-xl shadow-lg transform transition active:scale-95 text-xl">
                Play Again
            </button>
        </div>
    </div>

    <script>
        // --- GAME CONSTANTS & STATE ---
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 450;
        const GRAVITY = 0.3;     // Floaty underwater gravity
        const BUOYANCY = -0.1;   // Slow upward drift occasionally
        const FRICTION = 0.85;   // Water resistance
        
        let canvas, ctx;
        let previewCanvas, previewCtx;
        let animationId;
        
        let gameState = 'menu'; // menu, playing, gameover, win, level_transition
        let score = 0;
        let lives = 3;
        let cameraX = 0;
        
        let currentLevel = 1;
        const MAX_LEVELS = 3;
        let levelEndX = 3200;

        // Customization
        let colors = {
            tail: '#10b981',
            hair: '#f59e0b',
            top: '#ec4899',
            skin: '#fcd34d'
        };

        // Inputs
        const keys = { left: false, right: false, up: false };

        // Entities
        let player;
        let platforms = [];
        let collectibles = [];
        let enemies = [];
        let particles = [];
        let bubbles = [];

        // --- CLASSES ---

        class Player {
            constructor() {
                this.x = 100;
                this.y = GAME_HEIGHT / 2;
                this.width = 30;
                this.height = 50;
                this.vx = 0;
                this.vy = 0;
                this.speed = 4;
                this.jumpPower = -7;
                this.isGrounded = false;
                this.facingRight = true;
                this.swimFrame = 0;
                this.invulnerableTimer = 0;
            }

            update() {
                // Horizontal movement
                if (keys.left) {
                    this.vx -= 1;
                    this.facingRight = false;
                }
                if (keys.right) {
                    this.vx += 1;
                    this.facingRight = true;
                }

                // Apply water friction
                this.vx *= FRICTION;
                
                // Cap horizontal speed
                if (this.vx > this.speed) this.vx = this.speed;
                if (this.vx < -this.speed) this.vx = -this.speed;

                // Vertical movement (Swimming/Jumping)
                if (keys.up) {
                    this.vy += -0.8; // Swimming thrust
                    if (this.vy < this.jumpPower) this.vy = this.jumpPower;
                    // Spawn bubbles when swimming up
                    if (Math.random() < 0.2) spawnBubble(this.x, this.y + this.height/2);
                }

                // Apply gravity
                this.vy += GRAVITY;
                
                // Update positions
                this.x += this.vx;
                this.y += this.vy;

                // Animation
                this.swimFrame += Math.abs(this.vx) * 0.1 + (keys.up ? 0.2 : 0.05);

                // Invulnerability
                if (this.invulnerableTimer > 0) this.invulnerableTimer--;

                this.checkCollisions();

                // Boundaries
                if (this.x < 0) {
                    this.x = 0;
                    this.vx = 0;
                }
                if (this.y > GAME_HEIGHT + 100) {
                    takeDamage(); // Fell off the map
                }
                if (this.y < 0) {
                    this.y = 0;
                    this.vy = 0;
                }
            }

            checkCollisions() {
                this.isGrounded = false;
                for (let p of platforms) {
                    // Simple AABB collision
                    if (this.x < p.x + p.w &&
                        this.x + this.width > p.x &&
                        this.y < p.y + p.h &&
                        this.y + this.height > p.y) {
                        
                        // Resolve collision (very basic logic)
                        // Coming from above
                        if (this.vy > 0 && this.y + this.height - this.vy <= p.y + 10) {
                            this.isGrounded = true;
                            this.vy = 0;
                            this.y = p.y - this.height;
                        } 
                        // Coming from below
                        else if (this.vy < 0 && this.y - this.vy >= p.y + p.h - 10) {
                            this.vy = 0;
                            this.y = p.y + p.h;
                        }
                        // Hitting sides
                        else {
                            if (this.vx > 0) {
                                this.vx = 0;
                                this.x = p.x - this.width;
                            } else if (this.vx < 0) {
                                this.vx = 0;
                                this.x = p.x + p.w;
                            }
                        }
                    }
                }
            }

            draw(ctx) {
                // Blink if invulnerable
                if (this.invulnerableTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;

                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                if (!this.facingRight) ctx.scale(-1, 1);

                // Draw Mermaid (Centered on origin)
                
                // Hair (Back)
                ctx.fillStyle = colors.hair;
                ctx.beginPath();
                ctx.arc(-8, -10, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Flowing hair animation
                let hairWobble = Math.sin(this.swimFrame) * 3;
                ctx.beginPath();
                ctx.moveTo(-10, -15);
                ctx.quadraticCurveTo(-25, -5 + hairWobble, -20, 15 + hairWobble);
                ctx.lineTo(-5, -5);
                ctx.fill();

                // Tail (Animated)
                ctx.fillStyle = colors.tail;
                let tailAngle = Math.sin(this.swimFrame * 1.5) * 0.3;
                ctx.rotate(tailAngle);
                
                // Lower body
                ctx.beginPath();
                ctx.moveTo(-6, 5);
                ctx.lineTo(6, 5);
                ctx.lineTo(0, 25);
                ctx.fill();
                
                // Fin
                ctx.beginPath();
                ctx.moveTo(0, 22);
                ctx.lineTo(-10, 35);
                ctx.lineTo(10, 35);
                ctx.fill();
                
                ctx.rotate(-tailAngle); // unrotate

                // Upper Body (Skin)
                ctx.fillStyle = colors.skin;
                ctx.fillRect(-6, -5, 12, 12);
                
                // Top (Bikini/Shells)
                ctx.fillStyle = colors.top;
                ctx.beginPath(); ctx.arc(-3, -2, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(3, -2, 4, 0, Math.PI*2); ctx.fill();

                // Head
                ctx.fillStyle = colors.skin;
                ctx.beginPath();
                ctx.arc(0, -15, 10, 0, Math.PI * 2);
                ctx.fill();

                // Face (Eye & Smile)
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(3, -17, 1.5, 0, Math.PI*2); ctx.fill(); // Eye
                
                ctx.strokeStyle = '#d97706'; // Darker skin tone for smile
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(4, -13, 3, 0, Math.PI);
                ctx.stroke();

                // Front Arm (Animated paddling or stretched forward)
                ctx.fillStyle = colors.skin;
                ctx.save();
                ctx.translate(0, -2); // Shoulder joint
                
                let armAngle;
                if (Math.abs(this.vx) > 0.5) {
                    // Stretched out forward when moving horizontally
                    armAngle = -1.2 + Math.sin(this.swimFrame * 2) * 0.2; 
                } else {
                    // Idle downward paddling when still
                    armAngle = Math.sin(this.swimFrame * 1.5) * 0.5 + 0.3; 
                }
                
                ctx.rotate(armAngle);
                ctx.beginPath();
                ctx.roundRect(-2, -2, 4, 14, 2);
                ctx.fill();
                ctx.restore();

                // Hair (Front bang fixed - moved up and away from face)
                ctx.fillStyle = colors.hair;
                ctx.beginPath();
                ctx.arc(-4, -23, 6, 0, Math.PI * 2); // Top volume
                ctx.fill();
                ctx.beginPath();
                ctx.arc(3, -24, 4, 0, Math.PI * 2); // Sweeping top
                ctx.fill();
                ctx.beginPath();
                ctx.arc(6, -20, 3, 0, Math.PI * 2); // Side sweep
                ctx.fill();

                ctx.restore();
            }
        }

        class Platform {
            constructor(x, y, w, h, type = 'coral') {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.type = type;
                
                // Generate some visual decor based on width
                this.decor = [];
                for(let i=0; i<w/30; i++) {
                    if(Math.random() > 0.5) {
                        this.decor.push({
                            x: Math.random() * (w - 20) + 10,
                            size: Math.random() * 15 + 10,
                            color: ['#f43f5e', '#ec4899', '#8b5cf6'][Math.floor(Math.random()*3)]
                        });
                    }
                }
            }
            draw(ctx) {
                // Base
                ctx.fillStyle = this.type === 'coral' ? '#064e3b' : '#1e3a8a'; // Dark green or deep blue
                ctx.fillRect(this.x, this.y, this.w, this.h);
                
                // Top layer (sand/light coral)
                ctx.fillStyle = this.type === 'coral' ? '#10b981' : '#3b82f6';
                ctx.fillRect(this.x, this.y, this.w, 10);

                // Draw decor (coral tubes)
                ctx.save();
                ctx.translate(this.x, this.y);
                for(let d of this.decor) {
                    ctx.fillStyle = d.color;
                    ctx.beginPath();
                    ctx.roundRect(d.x - d.size/4, -d.size, d.size/2, d.size, [5, 5, 0, 0]);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        class Collectible {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.collected = false;
                this.floatOffset = Math.random() * Math.PI * 2;
            }
            update() {
                // Bob up and down
                this.currentY = this.y + Math.sin(Date.now() / 300 + this.floatOffset) * 5;
            }
            draw(ctx) {
                if (this.collected) return;
                
                // Glow
                ctx.shadowColor = '#fde047';
                ctx.shadowBlur = 10;
                
                // Pearl
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(this.x, this.currentY, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Shine
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x - 2, this.currentY - 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Enemy {
            constructor(x, y, walkDistance, type = 'crab') {
                this.type = type;
                this.startX = x;
                this.startY = y;
                this.x = x;
                this.y = y;
                this.walkDistance = walkDistance;
                this.dir = 1;
                this.isDead = false;
                this.animTimer = 0;
                
                if (this.type === 'crab') {
                    this.width = 24;
                    this.height = 16;
                    this.speed = 1;
                } else if (this.type === 'seal') {
                    this.width = 40;
                    this.height = 20;
                    this.speed = 1.5; // Seals swim a bit faster
                }
            }
            update() {
                if(this.isDead) return;

                this.x += this.speed * this.dir;
                if (Math.abs(this.x - this.startX) > this.walkDistance) {
                    this.dir *= -1; // Turn around
                }
                
                if (this.type === 'seal') {
                    // Seals bob up and down gracefully while swimming
                    this.y = this.startY + Math.sin(this.animTimer * 0.08) * 15;
                }
                
                this.animTimer++;
            }
            draw(ctx) {
                if(this.isDead) return;

                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                
                if (this.type === 'crab') {
                    ctx.fillStyle = '#ef4444'; // Red
                    // Body
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI*2);
                    ctx.fill();
                    
                    // Eyes
                    ctx.fillStyle = 'white';
                    ctx.beginPath(); ctx.arc(-5, -8, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -8, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'black';
                    ctx.beginPath(); ctx.arc(-5, -8, 1, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -8, 1, 0, Math.PI*2); ctx.fill();

                    // Claws (animated)
                    ctx.fillStyle = '#dc2626';
                    let clawLift = Math.sin(this.animTimer * 0.2) * 3;
                    ctx.beginPath(); ctx.arc(-12, -4 + clawLift, 4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(12, -4 - clawLift, 4, 0, Math.PI*2); ctx.fill();
                    
                    // Legs
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-10, 5); ctx.lineTo(-14, 10 + clawLift/2);
                    ctx.moveTo(-5, 7); ctx.lineTo(-8, 12);
                    ctx.moveTo(10, 5); ctx.lineTo(14, 10 - clawLift/2);
                    ctx.moveTo(5, 7); ctx.lineTo(8, 12);
                    ctx.stroke();
                } else if (this.type === 'seal') {
                    // Flip based on direction
                    ctx.scale(this.dir, 1);
                    
                    // Body
                    ctx.fillStyle = '#94a3b8'; // Slate gray
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 18, 10, 0, 0, Math.PI*2);
                    ctx.fill();
                    
                    // Tail flipper (animated)
                    let tailWobble = Math.sin(this.animTimer * 0.3) * 5;
                    ctx.beginPath();
                    ctx.moveTo(-15, 0);
                    ctx.lineTo(-25, -6 + tailWobble);
                    ctx.lineTo(-25, 6 + tailWobble);
                    ctx.fill();

                    // Front flipper (animated)
                    ctx.fillStyle = '#64748b'; // Darker gray
                    let flipAngle = Math.sin(this.animTimer * 0.2) * 0.3;
                    ctx.save();
                    ctx.translate(2, 4);
                    ctx.rotate(flipAngle);
                    ctx.beginPath();
                    ctx.ellipse(0, 4, 3, 7, -Math.PI/6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();

                    // Head
                    ctx.fillStyle = '#94a3b8';
                    ctx.beginPath();
                    ctx.arc(15, -4, 8, 0, Math.PI*2);
                    ctx.fill();
                    
                    // Snout
                    ctx.fillStyle = '#cbd5e1'; // Lighter gray snout
                    ctx.beginPath();
                    ctx.arc(20, -2, 4, 0, Math.PI*2);
                    ctx.fill();

                    // Nose & Eye
                    ctx.fillStyle = 'black';
                    ctx.beginPath(); ctx.arc(23, -3, 1.5, 0, Math.PI*2); ctx.fill(); // Nose
                    ctx.beginPath(); ctx.arc(16, -6, 1.5, 0, Math.PI*2); ctx.fill(); // Eye
                }

                ctx.restore();
            }
        }

        // --- GAME LOGIC ---

        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas resolution independently of display size
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', () => {
                if (gameState === 'level_transition') {
                    currentLevel++;
                    startLevel();
                } else {
                    startGame(); // Full reset if dead or beat whole game
                }
            });

            // Color pickers logic
            const updateColors = () => {
                colors.tail = document.getElementById('tail-color').value;
                colors.hair = document.getElementById('hair-color').value;
                colors.top = document.getElementById('top-color').value;
                drawPreview();
            };
            document.getElementById('tail-color').addEventListener('input', updateColors);
            document.getElementById('hair-color').addEventListener('input', updateColors);
            document.getElementById('top-color').addEventListener('input', updateColors);

            // Preview Canvas setup
            previewCanvas = document.getElementById('previewCanvas');
            previewCtx = previewCanvas.getContext('2d');
            
            // Generate initial preview player
            player = new Player();
            player.x = 25; // center in preview
            player.y = 15;
            
            drawPreview();
            setupControls();
        }

        function drawPreview() {
            previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            // Draw dummy player for preview
            player.swimFrame += 0.5; // pose
            player.draw(previewCtx);
        }

        function buildLevel() {
            platforms = [];
            collectibles = [];
            enemies = [];
            bubbles = [];
            particles = [];
            cameraX = 0;

            const addPearlRow = (startX, y, count) => {
                for(let i=0; i<count; i++) collectibles.push(new Collectible(startX + i*40, y));
            }

            if (currentLevel === 1) {
                levelEndX = 3200;
                // --- LEVEL 1: The Reef ---
                // Floor
                platforms.push(new Platform(-100, GAME_HEIGHT - 40, 600, 100));
                platforms.push(new Platform(600, GAME_HEIGHT - 60, 400, 150));
                platforms.push(new Platform(1150, GAME_HEIGHT - 40, 800, 100));
                platforms.push(new Platform(2100, GAME_HEIGHT - 80, 500, 200));
                platforms.push(new Platform(2800, GAME_HEIGHT - 40, 1000, 100)); // Finish line area

                // Floating Coral
                platforms.push(new Platform(300, 250, 120, 20));
                platforms.push(new Platform(500, 150, 100, 20));
                platforms.push(new Platform(800, 200, 150, 20));
                platforms.push(new Platform(1000, 100, 100, 20));
                platforms.push(new Platform(1400, 280, 100, 20));
                platforms.push(new Platform(1600, 180, 100, 20));
                platforms.push(new Platform(1800, 250, 150, 20));

                // Collectibles
                addPearlRow(200, GAME_HEIGHT - 80, 3);
                addPearlRow(320, 210, 3);
                addPearlRow(510, 110, 2);
                addPearlRow(700, GAME_HEIGHT - 100, 4);
                addPearlRow(820, 160, 3);
                addPearlRow(1200, GAME_HEIGHT - 80, 5);
                addPearlRow(1610, 140, 2);
                addPearlRow(1820, 210, 3);
                
                // Win condition big pearl pile
                addPearlRow(3100, GAME_HEIGHT - 80, 5);
                addPearlRow(3120, GAME_HEIGHT - 120, 4);
                addPearlRow(3140, GAME_HEIGHT - 160, 3);

                // Enemies
                enemies.push(new Enemy(400, GAME_HEIGHT - 56, 100)); // Crab
                enemies.push(new Enemy(750, GAME_HEIGHT - 76, 150)); // Crab
                
                // Add a seal swimming mid-water

                platforms.push(new Platform(800, 300, 100, 20));

                addPearlRow(810, 260, 2);

                // Win pile

                enemies.push(new Enemy(550, 150, 80, 'seal'));

                enemies.push(new Enemy(1700, GAME_HEIGHT - 56, 200));

                enemies.push(new Enemy(2420, 134, 50));

            } else if (currentLevel === 3) {
                levelEndX = 3500;

                platforms.push(new Platform(-100, GAME_HEIGHT - 40, 300, 100));

                platforms.push(new Platform(300, 250, 800, 20));
                platforms.push(new Platform(400, 100, 600, 20));
                
                platforms.push(new Platform(1200, GAME_HEIGHT - 40, 500, 100));

                platforms.push(new Platform(2400, 300, 100, 20));

                platforms.push(new Platform(3200, GAME_HEIGHT - 40, 600, 100)); // Finish

                addPearlRow(350, 210, 8);
                addPearlRow(450, 60, 6);
                addPearlRow(1300, GAME_HEIGHT - 80, 4);
                addPearlRow(1900, GAME_HEIGHT - 80, 4);
                addPearlRow(2410, 260, 2);
                addPearlRow(2610, 160, 2);
                addPearlRow(2810, 60, 2);

                // Win pile
                addPearlRow(3400, GAME_HEIGHT - 80, 5);

                // Enemies
                enemies.push(new Enemy(350, 234, 300));

                // Seals patrolling higher up and between platforms
                enemies.push(new Enemy(500, 150, 150, 'seal'));
                enemies.push(new Enemy(800, 250, 150, 'seal'));
                enemies.push(new Enemy(1000, 200, 150, 'seal'));
                enemies.push(new Enemy(1100, 150, 120, 'seal'));
                enemies.push(new Enemy(1500, 150, 150, 'seal'));
                enemies.push(new Enemy(1600, 200, 100, 'seal'));
                enemies.push(new Enemy(1700, 100, 150, 'seal'));
                enemies.push(new Enemy(2100, 250, 100, 'seal'));
                enemies.push(new Enemy(2200, 150, 120, 'seal'));
                enemies.push(new Enemy(2300, 100, 150, 'seal'));
                enemies.push(new Enemy(2500, 150, 100, 'seal'));
                enemies.push(new Enemy(2700, 200, 150, 'seal'));
                
                enemies.push(new Enemy(1400, GAME_HEIGHT - 56, 150));
                enemies.push(new Enemy(1900, GAME_HEIGHT - 56, 150));
                enemies.push(new Enemy(2000, GAME_HEIGHT - 56, 150));

            updateUI();
        }

        function startGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('gameCanvas').classList.remove('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            
            // Show touch controls on touch devices or small screens
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= 800) {
                document.getElementById('controls-layer').classList.remove('hidden');
            }

            score = 0;
            lives = 3;
            currentLevel = 1;
            startLevel();
            
            if (!animationId) {
                gameLoop();
            }
            
            // Generate ambient bubbles
            for(let i=0; i<30; i++) {
                bubbles.push({
                    x: Math.random() * GAME_WIDTH * 4,
                    y: Math.random() * GAME_HEIGHT,
                    size: Math.random() * 4 + 1,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        function startLevel() {
            player = new Player();
            player.x = 100;
            player.y = 200;
            buildLevel();
            document.getElementById('game-over-screen').classList.add('hidden');
            gameState = 'playing';
        }

        function takeDamage() {
            if (player.invulnerableTimer > 0) return;
            
            lives--;
            updateUI();
            
            // Knockback
            player.vy = -6;
            player.vx = player.facingRight ? -5 : 5;
            player.invulnerableTimer = 100; // frames
            
            // Create particles
            for(let i=0; i<10; i++) spawnParticle(player.x + player.width/2, player.y + player.height/2, 'red');

            if (lives <= 0) {
                gameOver(false);
            }
        }

        function gameOver(win) {
            if (win) {
                if (currentLevel < MAX_LEVELS) {
                    gameState = 'level_transition';
                    document.getElementById('game-over-screen').classList.remove('hidden');
                    document.getElementById('game-over-title').innerText = "Level " + currentLevel + " Complete!";
                    document.getElementById('game-over-title').className = "text-5xl font-bold text-teal-400 mb-4 drop-shadow-lg";
                    document.getElementById('final-score').innerText = score;
                    document.getElementById('restart-btn').innerText = "Next Level";
                } else {
                    gameState = 'win';
                    document.getElementById('game-over-screen').classList.remove('hidden');
                    document.getElementById('game-over-title').innerText = "You Win!";
                    document.getElementById('game-over-title').className = "text-5xl font-bold text-yellow-400 mb-4 drop-shadow-lg";
                    document.getElementById('final-score').innerText = score;
                    document.getElementById('restart-btn').innerText = "Play Again";
                }
            } else {
                gameState = 'gameover';
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('game-over-title').innerText = "Game Over!";
                document.getElementById('game-over-title').className = "text-5xl font-bold text-red-400 mb-4 drop-shadow-lg";
                document.getElementById('final-score').innerText = score;
                document.getElementById('restart-btn').innerText = "Try Again";
            }
        }

        function updateUI() {
            document.getElementById('score-display').innerText = score;
            document.getElementById('lives-display').innerText = '❤️'.repeat(lives);
            document.getElementById('level-display').innerText = currentLevel;
        }

        function spawnParticle(x, y, color) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 1,
                color: color
            });
        }

        function spawnBubble(x, y) {
            bubbles.push({
                x: x + (Math.random() - 0.5) * 20,
                y: y,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 2 + 1
            });
        }

        function update() {
            if (gameState !== 'playing') return;

            player.update();

            // Camera follow player smoothly
            let targetCameraX = player.x - GAME_WIDTH / 3;
            if (targetCameraX < 0) targetCameraX = 0;
            // Cap camera to end of level
            if (targetCameraX > 3200 - GAME_WIDTH) targetCameraX = 3200 - GAME_WIDTH;
            
            cameraX += (targetCameraX - cameraX) * 0.1;

            // Ambient Bubbles
            for (let b of bubbles) {
                b.y -= b.speed;
                b.x += Math.sin(Date.now()/500 + b.size) * 0.5; // Drift
                if (b.y < -10) {
                    b.y = GAME_HEIGHT + 10;
                    // Keep bubbles roughly within camera view so they don't all disappear
                    if (b.x < cameraX - 100 || b.x > cameraX + GAME_WIDTH + 100) {
                        b.x = cameraX + Math.random() * GAME_WIDTH;
                    }
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Collectibles
            for (let c of collectibles) {
                if (c.collected) continue;
                c.update();
                
                // Collision with player
                let dx = (player.x + player.width/2) - c.x;
                let dy = (player.y + player.height/2) - c.currentY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < c.radius + 20) { // Collection radius
                    c.collected = true;
                    score += 10;
                    updateUI();
                    for(let i=0; i<5; i++) spawnParticle(c.x, c.currentY, '#fef08a');
                }
            }

            // Enemies
            for (let e of enemies) {
                if (e.isDead) continue;
                e.update();
                
                // Active range optimization
                if(e.x < cameraX - 200 || e.x > cameraX + GAME_WIDTH + 200) continue;

                // Collision with player
                if (player.invulnerableTimer === 0 &&
                    player.x < e.x + e.width &&
                    player.x + player.width > e.x &&
                    player.y < e.y + e.height &&
                    player.y + player.height > e.y) {
                    
                    // Did player jump on it?
                    if (player.vy > 0 && player.y + player.height - player.vy <= e.y + 10) {
                        e.isDead = true;
                        player.vy = player.jumpPower * 0.8; // Bounce
                        score += 50;
                        updateUI();
                        // Color the defeat particles based on the enemy type!
                        let pColor = e.type === 'seal' ? '#94a3b8' : '#ef4444';
                        for(let i=0; i<8; i++) spawnParticle(e.x + e.width/2, e.y + e.height/2, pColor);
                    } else {
                        takeDamage();
                    }
                }
            }

            // Win Condition Check
            if (player.x > levelEndX) {
                gameOver(true);
            }
        }

        function draw() {
            if (!ctx) return;
            
            // Clear background (handled by CSS gradient, but clear canvas)
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.save();
            // Apply Camera Translation
            ctx.translate(-cameraX, 0);

            // Draw Background elements (Parallax)
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            // Draw some light shafts
            for(let i=0; i<10; i++) {
                let x = (i * 400 + cameraX * 0.8) % 4000;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x + 100, 0);
                ctx.lineTo(x - 200, GAME_HEIGHT);
                ctx.lineTo(x - 300, GAME_HEIGHT);
                ctx.fill();
            }

            // Draw Platforms
            for (let p of platforms) {
                if (p.x + p.w > cameraX && p.x < cameraX + GAME_WIDTH) {
                    p.draw(ctx);
                }
            }

            // Draw Collectibles
            for (let c of collectibles) {
                if (!c.collected && c.x > cameraX - 50 && c.x < cameraX + GAME_WIDTH + 50) {
                    c.draw(ctx);
                }
            }

            // Draw Enemies
            for (let e of enemies) {
                if (!e.isDead && e.x > cameraX - 50 && e.x < cameraX + GAME_WIDTH + 50) {
                    e.draw(ctx);
                }
            }

            // Draw Player
            player.draw(ctx);

            // Draw Particles
            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // Draw Foreground Bubbles
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let b of bubbles) {
                if (b.x > cameraX - 50 && b.x < cameraX + GAME_WIDTH + 50) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            ctx.restore();
            
            // Draw UI overlays (Dark edges for underwater feel)
            let grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, 'rgba(0,0,0,0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        }

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // --- CONTROLS ---
        function setupControls() {
            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
                if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = true;
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
                if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
            });

            // Touch/Mouse Buttons
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');

            const bindBtn = (btn, keyProp) => {
                const press = (e) => { e.preventDefault(); keys[keyProp] = true; btn.classList.add('active'); };
                const release = (e) => { e.preventDefault(); keys[keyProp] = false; btn.classList.remove('active'); };
                
                btn.addEventListener('mousedown', press);
                btn.addEventListener('touchstart', press, {passive: false});
                
                btn.addEventListener('mouseup', release);
                btn.addEventListener('mouseleave', release);
                btn.addEventListener('touchend', release);
                btn.addEventListener('touchcancel', release);
            };

            bindBtn(btnLeft, 'left');
            bindBtn(btnRight, 'right');
            bindBtn(btnJump, 'up');
            
            // Adjust canvas sizing for responsiveness
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        }

        function resizeCanvas() {
            const container = document.getElementById('game-container');
            const canvasEl = document.getElementById('gameCanvas');
            
            // Maintain aspect ratio via CSS
            let aspect = GAME_WIDTH / GAME_HEIGHT;
            let windowAspect = container.clientWidth / container.clientHeight;
            
            if (windowAspect > aspect) {
                canvasEl.style.height = '100%';
                canvasEl.style.width = 'auto';
            } else {
                canvasEl.style.width = '100%';
                canvasEl.style.height = 'auto';
            }
        }

        // Init on load
        window.onload = initGame;
    </script>
